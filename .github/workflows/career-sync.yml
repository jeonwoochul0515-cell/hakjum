name: 커리어넷 데이터 동기화

on:
  schedule:
    # 분기별: 1월, 4월, 7월, 10월 1일 오전 3시 (KST)
    - cron: '0 18 1 1,4,7,10 *'  # UTC 18시 = KST 03시
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run CareerNet bulk sync
        run: npx tsx scripts/career-bulk-sync.ts
        env:
          CAREER_API_KEY: ${{ secrets.CAREER_API_KEY }}

      - name: Commit data files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/career-cache.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-sync CareerNet data $(date +%Y-%m-%d)"
            git push
          fi
