name: Sync Admission Requirements

on:
  schedule:
    # 매월 1일, 15일 09:00 KST (00:00 UTC) 실행
    - cron: '0 0 1,15 * *'
  workflow_dispatch: # 수동 실행 가능

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Run admission sync
        run: node scripts/sync-admission.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/admission-crawled.json 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/admission-crawled.json data/admission-generated.ts.txt
          git commit -m "chore: auto-sync admission requirements $(date +%Y-%m-%d)"
          git push
