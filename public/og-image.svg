<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="55%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eef2ff"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0ea5e9"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="#0ea5e9" opacity="0.08"/>
  <circle cx="120" cy="540" r="160" fill="#6366f1" opacity="0.08"/>

  <!-- Butterfly icon (simplified) -->
  <g transform="translate(90,110)">
    <path d="M40 30 Q10 5 5 35 Q10 65 40 50 Q40 65 50 70 Q60 65 60 50 Q90 65 95 35 Q90 5 60 30 Q60 15 50 10 Q40 15 40 30 Z"
          fill="url(#accent)" opacity="0.9"/>
  </g>

  <!-- Brand badge -->
  <g transform="translate(200,135)">
    <text x="0" y="0" font-family="'Noto Sans KR', system-ui, sans-serif" font-size="34" font-weight="700" fill="#0ea5e9">학점나비</text>
    <text x="0" y="34" font-family="'Noto Sans KR', system-ui, sans-serif" font-size="18" font-weight="500" fill="#64748b">hakjum.school</text>
  </g>

  <!-- Main heading -->
  <text x="90" y="320" font-family="'Noto Sans KR', system-ui, sans-serif" font-size="74" font-weight="700" fill="#0f172a">
    고교학점제 AI 맞춤
  </text>
  <text x="90" y="410" font-family="'Noto Sans KR', system-ui, sans-serif" font-size="74" font-weight="700" fill="url(#accent)">
    학과·과목 추천
  </text>

  <!-- Subheading -->
  <text x="90" y="475" font-family="'Noto Sans KR', system-ui, sans-serif" font-size="28" font-weight="500" fill="#475569">
    내 꿈에 맞는 학과를 30초 만에 · 전국 고등학교 NEIS 연동
  </text>

  <!-- Feature pills -->
  <g font-family="'Noto Sans KR', system-ui, sans-serif" font-size="22" font-weight="600">
    <rect x="90" y="525" rx="22" ry="22" width="180" height="52" fill="#0ea5e9" opacity="0.12"/>
    <text x="180" y="558" text-anchor="middle" fill="#0369a1">AI 학과 분석</text>

    <rect x="290" y="525" rx="22" ry="22" width="200" height="52" fill="#6366f1" opacity="0.12"/>
    <text x="390" y="558" text-anchor="middle" fill="#4338ca">대교협 데이터</text>

    <rect x="510" y="525" rx="22" ry="22" width="220" height="52" fill="#10b981" opacity="0.12"/>
    <text x="620" y="558" text-anchor="middle" fill="#047857">학기별 로드맵</text>
  </g>
</svg>
